name: InkHoard CI

on:
  push:
    branches: ['inkhoard/**']
  pull_request:
    branches: ['inkhoard/**']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 'latest'
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-inkhoard-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-inkhoard-${{ runner.os }}-

      - name: Build CrossPoint (default / X4 flags)
        run: |
          set -euo pipefail
          pio run -e default | tee pio.log

      - name: Enforce app-partition size limit
        id: size
        run: |
          set -euo pipefail
          bin=".pio/build/default/firmware.bin"
          test -f "$bin"
          size="$(wc -c < "$bin" | tr -d ' ')"
          limit=6553600
          echo "firmware_bytes=${size}" >> "$GITHUB_OUTPUT"
          {
            echo "## InkHoard firmware artifact"
            echo "- Path: \`${bin}\`"
            echo "- Size: ${size} bytes"
            echo "- App partition limit: ${limit} bytes (0x640000)"
            ram_line="$(grep -E "RAM:\\s" -m1 pio.log || true)"
            flash_line="$(grep -E "Flash:\\s" -m1 pio.log || true)"
            if [ -n "$ram_line" ]; then echo "- ${ram_line}"; fi
            if [ -n "$flash_line" ]; then echo "- ${flash_line}"; fi
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$size" -gt "$limit" ]; then
            echo "firmware.bin (${size}) exceeds app partition limit (${limit})"
            exit 1
          fi

      - name: Upload firmware.bin artifact
        uses: actions/upload-artifact@v6
        with:
          name: inkhoard-firmware.bin
          path: .pio/build/default/firmware.bin
          if-no-files-found: error

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Cache googletest source
        uses: actions/cache@v4
        with:
          path: build/test/_deps/googletest-src
          key: ${{ runner.os }}-googletest-${{ hashFiles('test/CMakeLists.txt') }}

      - name: Configure
        run: cmake -S test -B build/test -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/test

      - name: Run tests
        run: ctest --test-dir build/test --output-on-failure -j

  test-status:
    name: InkHoard Test Status
    needs:
      - build
      - unit-tests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail because needed jobs failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - name: Success
        run: exit 0
